---
- name: Read valkey password from SOPS
  ansible.builtin.command:
    cmd: sops -d --extract '["valkey_password"]' {{ playbook_dir }}/../inventory/group_vars/all.sops.yml
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: valkey_password_result

- name: Set valkey password fact
  ansible.builtin.set_fact:
    valkey_password: "{{ valkey_password_result.stdout }}"
  no_log: true
