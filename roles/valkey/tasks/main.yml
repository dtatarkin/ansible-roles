---
- name: Remove Valkey
  ansible.builtin.include_tasks: remove.yml
  when: valkey_state == 'absent'

- name: Read valkey password from SOPS
  ansible.builtin.include_tasks: secret.yml
  when: valkey_state == 'present'

- name: Deploy Valkey
  ansible.builtin.include_tasks: deploy.yml
  when: valkey_state == 'present'

- name: Wait for Helm install job to complete
  ansible.builtin.command:
    cmd: kubectl -n kube-system wait --for=condition=complete job/helm-install-valkey --timeout=300s
  changed_when: false
  retries: 3
  delay: 15
  register: valkey_helm_job
  until: valkey_helm_job.rc == 0
  when: valkey_state == 'present'

- name: Verify Valkey
  ansible.builtin.include_tasks: verify.yml
  when: valkey_state == 'present'
