---
- name: Read CNPG superuser password from SOPS
  ansible.builtin.command:
    cmd: sops -d --extract '["cnpg_superuser_password"]' {{ playbook_dir }}/../inventory/group_vars/all.sops.yml
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: cnpg_superuser_password_result

- name: Set CNPG superuser password fact
  ansible.builtin.set_fact:
    cnpg_superuser_password: "{{ cnpg_superuser_password_result.stdout }}"
  no_log: true

- name: Read CNPG app password from SOPS
  ansible.builtin.command:
    cmd: sops -d --extract '["cnpg_app_password"]' {{ playbook_dir }}/../inventory/group_vars/all.sops.yml
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: cnpg_app_password_result

- name: Set CNPG app password fact
  ansible.builtin.set_fact:
    cnpg_app_password: "{{ cnpg_app_password_result.stdout }}"
  no_log: true

- name: Read user passwords from SOPS
  ansible.builtin.command:
    cmd: sops -d --extract '["cnpg_{{ item }}_password"]' {{ playbook_dir }}/../inventory/group_vars/all.sops.yml
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: _cnpg_user_password_results
  loop: "{{ cnpg_users | map(attribute='name') | list | unique }}"
  when: cnpg_state == 'present' and (cnpg_users | length > 0)

- name: Set dynamic user password facts
  ansible.builtin.set_fact:
    cnpg_passwords: "{{ cnpg_passwords | default({}) | combine({item.item: item.stdout}) }}"
  no_log: true
  loop: "{{ _cnpg_user_password_results.results }}"
  when: cnpg_state == 'present' and (cnpg_users | length > 0) and not item.failed | default(false)
