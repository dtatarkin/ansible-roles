---
- name: Remove CNPG database manifests
  ansible.builtin.file:
    path: "/var/lib/rancher/k3s/server/manifests/cnpg-database-{{ item.name | replace('_', '-') }}.yml"
    state: absent
  loop: "{{ cnpg_databases }}"
  when: cnpg_databases | length > 0

- name: Remove CNPG user secret manifests
  ansible.builtin.file:
    path: "/var/lib/rancher/k3s/server/manifests/cnpg-user-{{ item.name | replace('_', '-') }}-secret.yml"
    state: absent
  loop: "{{ cnpg_users }}"
  when: cnpg_users | length > 0

- name: Remove CNPG cluster manifest
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests/cnpg-cluster.yml
    state: absent

- name: Remove CNPG cluster namespace manifest
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests/cnpg-cluster-namespace.yml
    state: absent


- name: Delete PostgreSQL Cluster CRD to trigger cleanup
  ansible.builtin.command:
    cmd: kubectl -n {{ cnpg_namespace }} delete cluster {{ cnpg_cluster_name }} --ignore-not-found
  register: cnpg_cluster_delete
  changed_when: false
  failed_when:
    - cnpg_cluster_delete.rc != 0
    - '"the server doesn''t have a resource type" not in cnpg_cluster_delete.stderr'

- name: Wait for PostgreSQL cluster pods to terminate
  ansible.builtin.command:
    cmd: kubectl -n {{ cnpg_namespace }} get pod {{ cnpg_cluster_name }}-1
  register: cnpg_pod_check
  changed_when: false
  failed_when: false
  retries: 20
  delay: 15
  until: cnpg_pod_check.rc != 0

- name: Remove CNPG HelmChart manifest
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests/cnpg-helmchart.yml
    state: absent

- name: Remove CNPG superuser secret manifest
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests/cnpg-superuser-secret.yml
    state: absent

- name: Remove CNPG app secret manifest
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests/cnpg-app-secret.yml
    state: absent


- name: Delete CNPG HelmChart CRD to trigger Helm uninstall
  ansible.builtin.command:
    cmd: kubectl -n kube-system delete helmchart cnpg --ignore-not-found
  changed_when: false

- name: Wait for K3s to uninstall CNPG operator
  ansible.builtin.command:
    cmd: kubectl -n {{ cnpg_operator_namespace }} get deployment cnpg-cloudnative-pg
  register: cnpg_operator_check
  changed_when: false
  failed_when: false
  retries: 20
  delay: 15
  until: cnpg_operator_check.rc != 0

- name: Delete CNPG secrets from cluster
  ansible.builtin.command:
    argv: >-
      {{ ['kubectl', '-n', cnpg_namespace, 'delete', 'secret',
          'cnpg-superuser', 'cnpg-app']
         + (cnpg_users | map(attribute='name')
            | map('replace', '_', '-')
            | map('regex_replace', '^', 'cnpg-user-')
            | list)
         + ['--ignore-not-found'] }}
  changed_when: false

- name: Delete CNPG PVCs
  ansible.builtin.command:
    cmd: kubectl -n {{ cnpg_namespace }} delete pvc -l cnpg.io/cluster={{ cnpg_cluster_name }} --ignore-not-found
  changed_when: false
  when: cnpg_purge_data | bool
