---
- name: Deploy SOPS age key secret manifest
  ansible.builtin.template:
    src: flux-sops-age-secret.yml.j2
    dest: /var/lib/rancher/k3s/server/manifests/flux-sops-age-secret.yml
    mode: "0600"

- name: Deploy git auth secret manifest
  ansible.builtin.template:
    src: flux-git-auth-secret.yml.j2
    dest: /var/lib/rancher/k3s/server/manifests/flux-git-auth-secret.yml
    mode: "0600"

- name: Deploy GitRepository source manifest
  ansible.builtin.template:
    src: flux-git-source.yml.j2
    dest: /var/lib/rancher/k3s/server/manifests/flux-git-source.yml
    mode: "0600"

- name: Deploy Kustomization for apps manifest
  ansible.builtin.template:
    src: flux-kustomization-apps.yml.j2
    dest: /var/lib/rancher/k3s/server/manifests/flux-kustomization-apps.yml
    mode: "0600"

- name: Deploy registry credentials for image scanning
  ansible.builtin.template:
    src: flux-registry-secret.yml.j2
