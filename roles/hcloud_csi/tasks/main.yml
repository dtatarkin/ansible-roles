---
- name: Deploy hcloud CSI driver
  when: hcloud_csi_state == 'present'
  block:
    - name: Create hcloud CSI secret
      ansible.builtin.include_tasks: secret.yml

    - name: Deploy hcloud-csi HelmChart
      ansible.builtin.include_tasks: deploy.yml

    - name: Wait for Helm install job to complete
      ansible.builtin.command:
        cmd: kubectl -n kube-system wait --for=condition=complete job/helm-install-hcloud-csi --timeout=300s
      changed_when: false
      retries: 3
      delay: 15
      register: hcloud_csi_helm_job
      until: hcloud_csi_helm_job.rc == 0

    - name: Verify hcloud CSI driver
      ansible.builtin.include_tasks: verify.yml

- name: Remove hcloud CSI driver
  ansible.builtin.include_tasks: remove.yml
  when: hcloud_csi_state == 'absent'
