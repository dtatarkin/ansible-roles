---
- name: Read Grafana admin password from SOPS
  ansible.builtin.command:
    cmd: sops -d --extract '["monitoring_grafana_admin_password"]' {{ playbook_dir }}/../inventory/group_vars/all.sops.yml
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: monitoring_grafana_password_raw

- name: Set Grafana admin password fact
  ansible.builtin.set_fact:
    monitoring_grafana_admin_password: "{{ monitoring_grafana_password_raw.stdout }}"
  no_log: true
