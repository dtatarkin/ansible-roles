---
- name: Remove docker-registry
  ansible.builtin.include_tasks: remove.yml
  when: docker_registry_state == 'absent'

- name: Create docker-registry htpasswd secret
  ansible.builtin.include_tasks: secret.yml
  when: docker_registry_state == 'present'

- name: Deploy docker-registry-ui HelmChart
  ansible.builtin.include_tasks: deploy.yml
  when: docker_registry_state == 'present'

- name: Wait for Helm install job to complete
  ansible.builtin.command:
    cmd: kubectl -n kube-system wait --for=condition=complete job/helm-install-docker-registry-ui --timeout=300s
  changed_when: false
  retries: 3
  delay: 15
  register: docker_registry_helm_job
  until: docker_registry_helm_job.rc == 0
  when: docker_registry_state == 'present'

- name: Verify docker-registry
  ansible.builtin.include_tasks: verify.yml
  when: docker_registry_state == 'present'
