---
- name: Remove forward proxy
  ansible.builtin.include_tasks: remove.yml
  when: forward_proxy_state == 'absent'

- name: Read forward proxy secrets from SOPS
  ansible.builtin.include_tasks: secret.yml
  when: forward_proxy_state == 'present'

- name: Deploy forward proxy namespace
  ansible.builtin.include_tasks: namespace.yml
  when: forward_proxy_state == 'present'

- name: Deploy forward proxy
  ansible.builtin.include_tasks: deploy.yml
  when: forward_proxy_state == 'present'

- name: Verify forward proxy deployment
  ansible.builtin.include_tasks: verify.yml
  when: forward_proxy_state == 'present'
