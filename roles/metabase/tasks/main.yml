---
- name: Remove Metabase
  ansible.builtin.include_tasks: remove.yml
  when: metabase_state == 'absent'

- name: Read metabase secrets from SOPS
  ansible.builtin.include_tasks: secret.yml
  when: metabase_state == 'present'

- name: Deploy Metabase
  ansible.builtin.include_tasks: deploy.yml
  when: metabase_state == 'present'

- name: Wait for Helm install job to complete
  ansible.builtin.command:
    cmd: kubectl -n kube-system wait --for=condition=complete job/helm-install-metabase --timeout=300s
  changed_when: false
  failed_when: metabase_helm_job.rc != 0 and 'not found' not in metabase_helm_job.stderr
  retries: 3
  delay: 15
  register: metabase_helm_job
  until: metabase_helm_job.rc == 0 or 'not found' in metabase_helm_job.stderr
  when: metabase_state == 'present'

- name: Verify Metabase
  ansible.builtin.include_tasks: verify.yml
  when: metabase_state == 'present'
