---

# Role state: 'present' to deploy, 'absent' to remove
metabase_state: present
# pmint93/metabase Helm chart
# https://github.com/pmint93/helm-charts
metabase_chart_version: "2.24.3"
metabase_chart_repo: "https://pmint93.github.io/helm-charts"
metabase_namespace: metabase
metabase_domain: "metabase.{{ infra_domain }}"
metabase_clusterissuer: letsencrypt-production

# Backend database connection (CNPG)
metabase_db_host: postgres-rw.postgres.svc.cluster.local
metabase_db_port: 5432
metabase_db_user: metabase
metabase_db_name: metabase

# NodePort for direct access
metabase_node_port: 30009

# Resource requests (JVM app — 512Mi minimum)
metabase_resources:
  requests:
    cpu: 200m
    memory: 512Mi
