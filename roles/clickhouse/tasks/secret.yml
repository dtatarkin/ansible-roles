---
- name: Read clickhouse password from SOPS
  ansible.builtin.command:
    cmd: sops -d --extract '["clickhouse_password"]' {{ playbook_dir }}/../inventory/group_vars/all.sops.yml
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: clickhouse_password_result

- name: Compute SHA256 hash of clickhouse password
  ansible.builtin.set_fact:
    clickhouse_password_sha256: "{{ clickhouse_password_result.stdout | hash('sha256') }}"
  no_log: true

- name: Read user passwords from SOPS
  ansible.builtin.command:
    cmd: sops -d --extract '["clickhouse_{{ item }}_password"]' {{ playbook_dir }}/../inventory/group_vars/all.sops.yml
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: _clickhouse_user_password_results
  loop: "{{ clickhouse_users | map(attribute='name') | list | unique }}"
  when: clickhouse_users | length > 0

- name: Build user password dictionaries
  ansible.builtin.set_fact:
    clickhouse_passwords: "{{ clickhouse_passwords | default({}) | combine({item.item: item.stdout}) }}"
    clickhouse_password_hashes: "{{ clickhouse_password_hashes | default({}) | combine({item.item: item.stdout | hash('sha256')}) }}"
  no_log: true
  loop: "{{ _clickhouse_user_password_results.results }}"
  when: clickhouse_users | length > 0 and not item.skipped | default(false)
