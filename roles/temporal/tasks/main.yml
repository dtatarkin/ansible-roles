---
- name: Remove Temporal
  ansible.builtin.include_tasks: remove.yml
  when: temporal_state == 'absent'

- name: Read Temporal secrets from SOPS
  ansible.builtin.include_tasks: secret.yml
  when: temporal_state == 'present'

- name: Deploy Temporal namespace
  ansible.builtin.include_tasks: namespace.yml
  when: temporal_state == 'present'

- name: Deploy Temporal
  ansible.builtin.include_tasks: deploy.yml
  when: temporal_state == 'present'

- name: Verify Temporal deployment
  ansible.builtin.include_tasks: verify.yml
  when: temporal_state == 'present'
