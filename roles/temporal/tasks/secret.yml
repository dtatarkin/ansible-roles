---
- name: Decrypt Temporal secrets from SOPS
  ansible.builtin.command:
    cmd: sops -d {{ playbook_dir }}/../inventory/group_vars/all.sops.yml
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: temporal_sops_raw

- name: Set Temporal secret facts
  ansible.builtin.set_fact:
    temporal_db_password: "{{ (temporal_sops_raw.stdout | from_yaml).cnpg_temporal_password }}"
  no_log: true
