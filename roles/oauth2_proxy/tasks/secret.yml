---
- name: Decrypt OAuth2 Proxy secrets from SOPS
  ansible.builtin.command:
    cmd: sops -d {{ playbook_dir }}/../inventory/group_vars/all.sops.yml
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  register: oauth2_proxy_sops_raw

- name: Set OAuth2 Proxy secret facts
  ansible.builtin.set_fact:
    oauth2_proxy_client_id: "{{ (oauth2_proxy_sops_raw.stdout | from_yaml).oauth2_proxy_google_client_id }}"
    oauth2_proxy_client_secret: "{{ (oauth2_proxy_sops_raw.stdout | from_yaml).oauth2_proxy_google_client_secret }}"
    oauth2_proxy_cookie_secret: "{{ (oauth2_proxy_sops_raw.stdout | from_yaml).oauth2_proxy_cookie_secret }}"
  no_log: true
