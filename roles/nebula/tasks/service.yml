---
- name: Deploy nebula systemd unit
  ansible.builtin.template:
    src: nebula.service.j2
    dest: /etc/systemd/system/nebula.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart nebula

- name: Enable and start nebula service
  ansible.builtin.systemd:
    name: nebula
    enabled: true
    state: started
    daemon_reload: true
